---
- hosts: all
  vars:
    real_user: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"
    real_home: "{{ '/home/' ~ real_user if ansible_env.SUDO_USER is defined else ansible_env.HOME }}"
    osbook_dir: "{{ (run_dir | default(real_home ~ '/Programs/mikanos-build/devenv')) | dirname }}"
    devenv_dir: "{{ osbook_dir }}/devenv"
    edk2_dir: "{{ osbook_dir }}/edk2"
    llvm_version: "14"

  tasks:
    - name: ensure development tools are at the latest version
      become: yes
      apt:
        name:
          - build-essential
          - llvm-14-dev
          - lld-14
          - clang-14
          - nasm
          - acpica-tools
          - uuid-dev
          - qemu-system-x86
          - qemu-utils
          - xauth
          - unzip
          - python3-setuptools
          - ca-certificates
        state: latest
        install_recommends: no

    - name: check whether qemu-system-gui exists
      command: dpkg-query --show qemu-system-gui
      failed_when: False
      changed_when: False
      register: qemu_gui_result

    - name: install qemu gui package if exists
      become: yes
      apt: name=qemu-system-gui state=latest install_recommends=no
      when: qemu_gui_result.rc == 0

    - name: clone EDK II repository
      git:
        repo: "https://github.com/tianocore/edk2.git"
        dest: "{{ edk2_dir }}"
        version: "edk2-stable202208"
        force: no
      register: edk2_git
      failed_when:
        - edk2_git.failed
        - "'Local modifications' not in (edk2_git.msg | default(''))"

    # パッチ対象ファイルを常にクリーンな状態に戻す
    - name: reset EDK II Pccts sources to clean state before patching
      command: git checkout -- BaseTools/Source/C/VfrCompile/Pccts/
      args:
        chdir: "{{ edk2_dir }}"

    # patch_edk2.py を devenv/ から同じ devenv/ へコピー（playbook_dir 経由で確実に配置）
    - name: deploy patch_edk2.py from devenv
      copy:
        src: "{{ playbook_dir }}/patch_edk2.py"
        dest: "{{ devenv_dir }}/patch_edk2.py"
        mode: "0755"
        remote_src: yes

    - name: patch EDK II VfrCompile for GCC 14 compatibility
      command: python3 "{{ devenv_dir }}/patch_edk2.py" "{{ edk2_dir }}"
      register: vfrcompile_patch
      changed_when: "'patched:' in vfrcompile_patch.stdout"

    - name: clean EDK II base tools build cache after patch
      shell: make clean
      args:
        chdir: "{{ edk2_dir }}/BaseTools/Source/C"

    - name: build EDK II base tools
      shell: make
      args:
        chdir: "{{ edk2_dir }}/BaseTools/Source/C"

    - name: ensure devenv directory exists
      file:
        path: "{{ devenv_dir }}"
        state: directory

    - name: download standard libraries
      unarchive:
        src: "https://github.com/uchan-nos/mikanos-build/releases/download/v2.0/x86_64-elf.tar.gz"
        dest: "{{ devenv_dir }}"
        remote_src: yes

    - name: configure display variable if WSL1
      lineinfile:
        path: "{{ real_home }}/.profile"
        regexp: "^export DISPLAY="
        line: "export DISPLAY=:0"
      when: "'DISPLAY' not in ansible_env and 'WSLENV' in ansible_env and 'WSL_INTEROP' not in ansible_env"

    - name: configure display variable if WSL2
      lineinfile:
        path: "{{ real_home }}/.profile"
        regexp: "^export DISPLAY="
        line: "export DISPLAY=$(awk '/nameserver / {print $2; exit}' /etc/resolv.conf 2>/dev/null):0"
      when: "'DISPLAY' not in ansible_env and 'WSL_INTEROP' in ansible_env"
